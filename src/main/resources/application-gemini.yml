# Profile 'gemini' — uses Google Gemini via its OpenAI-compatible endpoint.
# Run with: SPRING_PROFILES_ACTIVE=gemini ./mvnw spring-boot:run
#
# Get your key from Google AI Studio (https://aistudio.google.com/apikey):
#   export GEMINI_API_KEY=...
#
# Trick: Gemini exposes an OpenAI-compatible API, so no new dependency is needed —
# we reuse the OpenAI starter and only change base-url and paths.
# Therefore spring.ai.model.chat/embedding stay 'openai' (set in application.yml).
#
# NOTE: Gemini embeddings have a DIFFERENT dimension than OpenAI (gemini-embedding-001 = 3072,
# OpenAI text-embedding-3-small = 1536). After switching models, REINDEX your
# documents (POST /api/documents/{id}/reindex) — otherwise similarity search will
# fail on dimension mismatch. Check the active dimension via GET /api/documents/stats.
spring:
  ai:
    openai:
      api-key: ${GEMINI_API_KEY}
      base-url: https://generativelanguage.googleapis.com
      chat:
        # full URL: .../v1beta/openai/chat/completions
        completions-path: /v1beta/openai/chat/completions
        options:
          model: gemini-2.0-flash
          temperature: 0.2
      embedding:
        # full URL: .../v1beta/openai/embeddings
        embeddings-path: /v1beta/openai/embeddings
        options:
          # gemini-embedding-001 is the current GA model (text-embedding-004 is not
          # served by the OpenAI-compatible layer — returns 404 embedContent).
          model: gemini-embedding-001
