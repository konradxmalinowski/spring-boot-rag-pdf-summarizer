# Profile 'ollama' — easy switch from OpenAI to a local Ollama LLM.
# Run with: SPRING_PROFILES_ACTIVE=ollama ./mvnw spring-boot:run
#
# Requires a locally running Ollama instance with the required models pulled, e.g.:
#   ollama pull llama3.1
#   ollama pull nomic-embed-text
#
# NOTE: embeddings must be consistent — if documents were indexed with OpenAI,
# re-index them after switching to Ollama (POST /reindex), because the
# embedding dimensions and vector space differ.
spring:
  ai:
    # Switch the model provider to Ollama (overrides OpenAI from application.yml).
    model:
      chat: ollama
      embedding: ollama
    # The OpenAI starter is still on the classpath but inactive — the key is not used.
    openai:
      api-key: not-needed
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3.1
          temperature: 0.2
      embedding:
        options:
          model: nomic-embed-text
