spring:
  application:
    name: spring-ai-rag

  # --- PostgreSQL: document/chunk metadata ---
  datasource:
    url: jdbc:postgresql://localhost:5432/ragdb
    username: rag
    password: ${DB_PASSWORD:rag}
  jpa:
    hibernate:
      ddl-auto: update        # creates/updates tables on startup (convenient for development)
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  # --- Upload size limits (container-level size validation) ---
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  ai:
    # Model provider selection. Both OpenAI and Ollama starters are on the classpath,
    # so Spring AI must know which one to use. Default: OpenAI.
    # The 'ollama' profile overrides these values.
    model:
      chat: openai
      embedding: openai
    # --- Default model: OpenAI (chat + embeddings) ---
    openai:
      api-key: ${OPENAI_API_KEY}     # set as an environment variable
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.2
      embedding:
        options:
          model: text-embedding-3-small

    # --- Primary vector store: ChromaDB ---
    vectorstore:
      chroma:
        initialize-schema: true       # create the collection if it does not exist
        collection-name: rag_documents
        client:
          host: http://localhost
          port: 8000

# Accepted PDF file limits (validated in the service layer)
app:
  upload:
    max-file-size-bytes: 20971520     # 20 MB
    allowed-content-type: application/pdf
  rag:
    top-k: 4                          # number of chunks fetched into context
    similarity-threshold: 0.0         # 0 = no threshold (Chroma returns top-k)

server:
  port: 8080

logging:
  level:
    org.springframework.ai: INFO
